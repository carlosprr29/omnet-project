[General]
network = TwoQueues
cpu-time-limit = 5000s
sim-time-limit = 5000s
warmup-period = 400s
repeat = 20

# ---------------------------------------------------------
# Configuración de Resultados (Corregida para evitar --)
# ---------------------------------------------------------
output-scalar-file = "${resultdir}/${configname}-${iterationvarsf}-#${repetition}.sca"
output-vector-file = "${resultdir}/${configname}-${iterationvarsf}-#${repetition}.vec"

# Registro de vectores
**.vector-recording = true

# =====================================================
# EXPERIMENTOS (Barrido de parámetros)
# =====================================================

[Config Experimentos]
description = "Barrido completo de parámetros Proyecto 12"

# Parámetros de llegada (Source 1 y 2)
**.source1.p = ${p=0.6, 0.7}
**.source1.q = 0.2  

**.source2.p = 0.6  
**.source2.q = ${q=0.2, 0.3}

# Parámetros de Mantenimiento (Servidor 2)
**.serverWithMaintenance.Y = ${Y=10, 20, 30}
**.serverWithMaintenance.m = ${m=2, 3, 4, 5}